<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INFERNO POOL ONLINE FIX</title>
</head>
<body style="background:black;color:white;text-align:center">

<h2 id="status">READY</h2>
<button onclick="startOnlineMode()">PLAY ONLINE</button>

<script>
let ws;
const status = document.getElementById("status");

function startOnlineMode(){
    status.innerText = "CONNECTING...";

    // 🔥 LOCAL SERVER
    ws = new WebSocket("ws://127.0.0.1:3001");

    ws.onopen = ()=>{
        status.innerText = "CONNECTED";
    };

    ws.onmessage = (msg)=>{
        const data = JSON.parse(msg.data);

        if(data.type==="waiting") status.innerText="WAITING PLAYER...";
        if(data.type==="match") status.innerText="MATCH FOUND!";
    };

    ws.onerror = ()=>{
        status.innerText = "ERROR";
    };

    ws.onclose = ()=>{
        status.innerText = "DISCONNECTED";
    };
}
</script>
