<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Match FIX</title>
<style>
body{margin:0;background:black;color:white;text-align:center}
canvas{display:block;margin:auto;background:#111}
</style>
</head>
<body>

<h2 id="status">Connecting...</h2>
<canvas id="c" width="740" height="400"></canvas>

<script>
const ws=new WebSocket("ws://127.0.0.1:3000");

const status=document.getElementById("status");
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let balls=[];

ws.onmessage=(msg)=>{
  const data=JSON.parse(msg.data);

  if(data.type==="waiting") status.innerText="Waiting...";
  if(data.type==="match") status.innerText="MATCHED";

  if(data.type==="init") balls=data.balls;
  if(data.type==="sync") balls=data.balls;
};

function draw(){
  ctx.clearRect(0,0,740,400);

  balls.forEach(b=>{
    if(b.sunk) return;
    ctx.beginPath();
    ctx.arc(b.x,b.y,10,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

canvas.onclick=()=>{
  ws.send(JSON.stringify({type:"shoot",vx:5,vy:2}));
};
</script>

</body>
</html>
