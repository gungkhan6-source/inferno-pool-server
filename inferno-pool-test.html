<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inferno Pool STABLE</title>
<style>
body{margin:0;background:black}
canvas{display:block;margin:auto;background:#111}
</style>
</head>
<body>

<canvas id="c" width="740" height="400"></canvas>

<script>
// Connect to WS on port 3001 (separate from HTTP)
const ws = new WebSocket("ws://localhost:3001");

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let balls = [];

ws.onopen = () => console.log("WS OPEN");
ws.onerror = () => console.log("WS ERROR");
ws.onclose = () => console.log("WS CLOSED");

ws.onmessage = (msg) => {
  try {
    const data = JSON.parse(msg.data);
    if (data.type === "init") balls = data.balls || [];
    if (data.type === "sync") balls = data.balls || [];
  } catch (e) {}
};

function draw(){
  ctx.clearRect(0,0,740,400);

  if (balls && balls.length) {
    balls.forEach(b=>{
      if (b.sunk) return;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 10, 0, Math.PI*2);
      ctx.fillStyle = "white";
      ctx.fill();
    });
  }

  requestAnimationFrame(draw);
}

draw();

canvas.onclick = () => {
  try {
    ws.send(JSON.stringify({ type: "shoot", vx: 5, vy: 2 }));
  } catch (e) {}
};
</script>

</body>
</html>
